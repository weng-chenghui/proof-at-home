<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Gallery — Proof@Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <style>
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .nft-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            transition: all var(--transition);
        }
        .nft-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }
        .nft-card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .nft-card-header h3 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 650;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .badge-type {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.125rem 0.5rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-contribution { background: var(--accent-subtle); color: var(--accent); }
        .badge-review { background: var(--yellow-subtle); color: var(--yellow); }
        .badge-exposition { background: #e0f2f1; color: #00796b; }
        .badge-published { background: var(--green-subtle); color: var(--green); }
        .badge-draft { background: var(--code-bg); color: var(--text-muted); }
        .nft-card-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }
        .nft-card-stats span { white-space: nowrap; }
        .nft-card-stats strong { color: var(--text); font-weight: 600; }
        .nft-card-footer {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .nft-card-footer a {
            font-size: 0.75rem;
        }
        .credit-contributors {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }
        .credit-role-badge {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .credit-role-author { background: var(--accent-subtle); color: var(--accent); }
        .credit-role-editor { background: var(--yellow-subtle); color: var(--yellow); }
        .credit-role-contributor { background: #e0f2f1; color: #00796b; }
        .credit-role-reviewer { background: #f3e5f5; color: #7b1fa2; }
        .edition-timeline {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-bottom: 0.5rem;
        }
        .edition-dot {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            background: var(--code-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .edition-dot.current {
            background: var(--accent-subtle);
            color: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
        }
        .stale-indicator {
            background: #fef3cd;
            border: 1px solid #ffc107;
            padding: 0.35rem 0.625rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .badge-edition-sealed {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.125rem 0.5rem;
            border-radius: 999px;
            background: var(--green-subtle);
            color: var(--green);
        }
    </style>
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <h1>NFT Gallery</h1>
        <p class="text-secondary" style="margin-bottom:1.5rem;font-size:0.9rem">Every contribution and certification creates a permanent credit record — verifiable proof of your work. Published entries are pinned to IPFS.</p>

        <div class="tab-bar">
            <button class="active" onclick="filterTab('all', this)">All</button>
            <button onclick="filterTab('contribution', this)">Contributions</button>
            <button onclick="filterTab('certificate', this)">Certificates</button>
            <button onclick="filterTab('exposition', this)">Expositions</button>
            <button onclick="filterTab('lessons-series', this)">Lessons &amp; Series</button>
        </div>

        <div id="msg" class="msg" style="display:none"></div>
        <div id="gallery" class="nft-grid"></div>
        <div id="lessons-series-gallery" class="nft-grid" style="display:none"></div>
        <div id="empty" class="empty-state" style="display:none">
            <h2>No records yet</h2>
            <p>NFT metadata is generated when contributions and certificates are sealed.</p>
            <a href="/guide-admin.html" class="btn">Setup Guide</a>
        </div>
    </div>
    <script src="/shared.js"></script>
    <script>
        let allCards = [];
        let currentFilter = 'all';

        function getAttr(nft, traitType) {
            if (!nft || !nft.attributes) return null;
            const attr = nft.attributes.find(a => a.trait_type === traitType);
            return attr ? attr.value : null;
        }

        function renderCards(cards) {
            const gallery = document.getElementById('gallery');
            const empty = document.getElementById('empty');
            const filtered = currentFilter === 'all' ? cards : cards.filter(c => c.type === currentFilter);

            if (filtered.length === 0) {
                gallery.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            gallery.innerHTML = filtered.map(c => {
                const typeBadgeMap = {
                    contribution: '<span class="badge badge-type badge-contribution">Contribution</span>',
                    certificate: '<span class="badge badge-type badge-review">Certificate</span>',
                    exposition: '<span class="badge badge-type badge-exposition">Exposition</span>'
                };
                const typeBadge = typeBadgeMap[c.type] || typeBadgeMap.contribution;
                const statusBadge = c.published
                    ? '<span class="badge badge-type badge-published">Published</span>'
                    : '<span class="badge badge-type badge-draft">Draft</span>';

                let stats = '';
                if (c.type === 'contribution') {
                    const proved = getAttr(c.nft, 'Conjectures Proved');
                    const attempted = getAttr(c.nft, 'Conjectures Attempted');
                    const cost = getAttr(c.nft, 'Cost Donated (USD)');
                    const assistant = getAttr(c.nft, 'Prover');
                    if (proved !== null) stats += `<span><strong>${proved}</strong>/${attempted || '?'} conjectures proved</span>`;
                    if (cost) stats += `<span>$${cost} donated</span>`;
                    if (assistant) stats += `<span>${escapeHtml(assistant)}</span>`;
                } else if (c.type === 'exposition') {
                    const conjId = getAttr(c.nft, 'Conjecture ID');
                    const prover = getAttr(c.nft, 'Prover');
                    const cost = getAttr(c.nft, 'AI Cost (USD)');
                    const strategy = getAttr(c.nft, 'Strategy Used');
                    if (conjId) stats += `<span>Conjecture: <strong>${escapeHtml(conjId)}</strong></span>`;
                    if (prover) stats += `<span>${escapeHtml(prover)}</span>`;
                    if (cost) stats += `<span>$${cost}</span>`;
                    if (strategy) stats += `<span>${escapeHtml(strategy)}</span>`;
                } else {
                    const pkgs = getAttr(c.nft, 'Packages Certified');
                    const conjectures = getAttr(c.nft, 'Conjectures Compared');
                    const rec = getAttr(c.nft, 'Recommendation');
                    if (pkgs !== null) stats += `<span><strong>${pkgs}</strong> packages</span>`;
                    if (conjectures !== null) stats += `<span><strong>${conjectures}</strong> conjectures</span>`;
                    if (rec) stats += `<span>${escapeHtml(rec)}</span>`;
                }

                const gitCommit = getAttr(c.nft, 'Git Commit');
                const gitRepo = getAttr(c.nft, 'Git Repository');
                const gitLink = gitCommit && gitRepo
                    ? `<a href="${escapeHtml(gitRepo)}/tree/${escapeHtml(gitCommit)}" target="_blank" title="${escapeHtml(gitCommit)}">Git ${gitCommit.substring(0, 8)}</a>`
                    : '';
                const ipfsLink = c.published && c.ipfs_cid
                    ? `<a href="https://gateway.pinata.cloud/ipfs/${encodeURIComponent(c.ipfs_cid)}" target="_blank">View on IPFS</a>`
                    : '';

                return `
                    <div class="nft-card">
                        <div class="nft-card-header">
                            <h3 title="${escapeHtml(c.name)}">${escapeHtml(c.name)}</h3>
                            ${typeBadge}
                        </div>
                        <div class="nft-card-stats">${stats}</div>
                        <div class="nft-card-footer">
                            ${statusBadge}
                            <span>${escapeHtml(c.username)}</span>
                            ${gitLink}
                            ${ipfsLink}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterTab(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const gallery = document.getElementById('gallery');
            const lsGallery = document.getElementById('lessons-series-gallery');
            const empty = document.getElementById('empty');

            if (type === 'lessons-series') {
                gallery.style.display = 'none';
                lsGallery.style.display = '';
                empty.style.display = 'none';
                loadLessonsSeries();
            } else {
                gallery.style.display = '';
                lsGallery.style.display = 'none';
                renderCards(allCards);
            }
        }

        let lsLoaded = false;

        async function loadLessonsSeries() {
            const lsGallery = document.getElementById('lessons-series-gallery');
            const empty = document.getElementById('empty');

            if (lsLoaded) return; // avoid re-fetching

            lsGallery.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">Loading lessons &amp; series...</p>';

            try {
                const [lessons, seriesList] = await Promise.all([
                    api('GET', '/lessons').catch(() => []),
                    api('GET', '/series').catch(() => [])
                ]);

                const items = [];

                // Fetch individual lessons for staleness info
                const lessonDetails = await Promise.allSettled(
                    (lessons || []).map(l => api('GET', '/lessons/' + encodeURIComponent(l.lesson_id || l.id)))
                );

                (lessonDetails || []).forEach((result, i) => {
                    if (result.status !== 'fulfilled') return;
                    const l = result.value;
                    if (!l.credits && !l.edition_stale) return; // skip lessons without credits data
                    items.push({ kind: 'lesson', data: l });
                });

                // Fetch individual series for staleness info
                const seriesDetails = await Promise.allSettled(
                    (seriesList || []).map(s => api('GET', '/series/' + encodeURIComponent(s.series_id || s.id)))
                );

                (seriesDetails || []).forEach((result, i) => {
                    if (result.status !== 'fulfilled') return;
                    const s = result.value;
                    if (!s.credits && !s.edition_stale) return;
                    items.push({ kind: 'series', data: s });
                });

                if (items.length === 0) {
                    lsGallery.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                lsGallery.innerHTML = items.map(item => {
                    const d = item.data;
                    const title = d.title || d.lesson_id || d.series_id || 'Untitled';
                    const kindLabel = item.kind === 'lesson' ? 'Lesson' : 'Series';
                    const kindBadge = item.kind === 'lesson'
                        ? '<span class="badge badge-type badge-contribution">Lesson</span>'
                        : '<span class="badge badge-type badge-exposition">Series</span>';

                    // Contributors
                    let contribHtml = '';
                    if (d.credits && d.credits.contributors && d.credits.contributors.length > 0) {
                        contribHtml = '<div class="credit-contributors">' + d.credits.contributors.map(c => {
                            const roleClass = c.role ? 'credit-role-' + escapeHtml(c.role) : 'credit-role-contributor';
                            const roleBadge = c.role ? `<span class="credit-role-badge ${roleClass}">${escapeHtml(c.role)}</span>` : '';
                            return `<span>${escapeHtml(c.username || c.name || 'Unknown')} ${roleBadge}</span>`;
                        }).join('') + '</div>';
                    }

                    // Edition timeline
                    let editionHtml = '';
                    if (d.credits && d.credits.edition) {
                        const ed = d.credits.edition;
                        const current = ed.current || 1;
                        const history = ed.history || [];
                        if (history.length > 0) {
                            editionHtml = '<div class="edition-timeline">' + history.map((h, idx) => {
                                const isCurrent = (h.number || idx + 1) === current;
                                return `<span class="edition-dot${isCurrent ? ' current' : ''}">Ed. ${escapeHtml(String(h.number || idx + 1))}${h.date ? ' &middot; ' + escapeHtml(h.date) : ''}</span>`;
                            }).join('') + '</div>';
                        } else {
                            editionHtml = `<div class="edition-timeline"><span class="edition-dot current">Edition ${escapeHtml(String(current))}</span></div>`;
                        }
                    }

                    // Staleness indicator
                    let staleHtml = '';
                    if (d.edition_stale) {
                        const edNum = d.credits && d.credits.edition && d.credits.edition.current ? d.credits.edition.current : '?';
                        staleHtml = `<div class="stale-indicator">&#9888; Content changed since Edition ${escapeHtml(String(edNum))}</div>`;
                    }

                    // Sealed badge
                    let sealedBadge = '';
                    if (d.credits && d.credits.edition && d.credits.edition.sealed_at) {
                        const edNum = d.credits.edition.current || '?';
                        sealedBadge = `<span class="badge-edition-sealed">Edition ${escapeHtml(String(edNum))} sealed</span>`;
                    }

                    return `
                        <div class="nft-card">
                            <div class="nft-card-header">
                                <h3 title="${escapeHtml(title)}">${escapeHtml(title)}</h3>
                                ${kindBadge}
                            </div>
                            ${staleHtml}
                            ${contribHtml}
                            ${editionHtml}
                            <div class="nft-card-footer">
                                ${sealedBadge}
                                ${d.author_username ? '<span>' + escapeHtml(d.author_username) + '</span>' : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                lsLoaded = true;
            } catch (e) {
                lsGallery.innerHTML = `<p style="color:#991b1b;font-size:0.85rem;">Failed to load: ${escapeHtml(e.error || e.message || 'unknown error')}</p>`;
            }
        }

        async function load() {
            try {
                const [contributions, certificates, expositions] = await Promise.all([
                    api('GET', '/contributions').catch(() => []),
                    api('GET', '/certificates').catch(() => []),
                    api('GET', '/expositions').catch(() => [])
                ]);

                allCards = [];

                (contributions || []).forEach(c => {
                    const nft = c.nft_metadata;
                    const archiveCid = getAttr(nft, 'Archive IPFS CID');
                    allCards.push({
                        type: 'contribution',
                        name: (nft && nft.name) || `Contribution ${c.contribution_id || ''}`,
                        username: c.username || getAttr(nft, 'Username') || 'Unknown',
                        nft: nft,
                        published: !!archiveCid,
                        ipfs_cid: archiveCid
                    });
                });

                (certificates || []).forEach(r => {
                    const nft = r.nft_metadata;
                    const archiveCid = getAttr(nft, 'Archive IPFS CID');
                    allCards.push({
                        type: 'certificate',
                        name: (nft && nft.name) || `Certificate ${r.certificate_id || ''}`,
                        username: r.certifier_username || getAttr(nft, 'Certifier') || 'Unknown',
                        nft: nft,
                        published: !!archiveCid,
                        ipfs_cid: archiveCid
                    });
                });

                (expositions || []).forEach(e => {
                    const nft = e.nft_metadata;
                    const archiveCid = getAttr(nft, 'Archive IPFS CID');
                    allCards.push({
                        type: 'exposition',
                        name: (nft && nft.name) || `Exposition ${e.exposition_id || ''}`,
                        username: e.author_username || getAttr(nft, 'Author Username') || 'Unknown',
                        nft: nft,
                        published: !!archiveCid,
                        ipfs_cid: archiveCid
                    });
                });

                renderCards(allCards);
            } catch (e) {
                showMsg('msg', 'Failed to load gallery: ' + (e.error || e.message || 'unknown error'), true);
            }
        }

        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
</html>
