<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exposition Detail — Proof@Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <style>
        .viz-meta { background: var(--code-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 0.85rem; }
        .viz-meta dt { color: var(--text-secondary); font-weight: 600; display: inline; }
        .viz-meta dd { display: inline; margin: 0 1.5rem 0 0.25rem; }
        .viz-summary { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 0; }
        .tab { padding: 10px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .panel { display: none; padding: 1.5rem 0; }
        .panel.active { display: block; }
        .panel-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .panel-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
        .viz-container { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; min-height: 400px; position: relative; }
        .viz-container svg { width: 100%; height: 500px; }
        .graph-link { stroke: var(--border); stroke-width: 1.5px; }
        .graph-link-directed { marker-end: url(#arrowhead); }
        .graph-node-circle { stroke-width: 2px; cursor: pointer; transition: filter 0.15s; }
        .graph-node-circle:hover { filter: brightness(1.3); }
        .graph-node-label { font-size: 11px; fill: var(--text-primary); text-anchor: middle; pointer-events: none; }
        .graph-edge-label { font-size: 10px; fill: var(--text-secondary); text-anchor: middle; }
        .cd-object { font-size: 14px; fill: var(--text-primary); text-anchor: middle; dominant-baseline: middle; }
        .cd-arrow { stroke: #58a6ff; stroke-width: 1.5px; fill: none; marker-end: url(#cd-arrowhead); }
        .cd-arrow-dashed { stroke-dasharray: 5,3; }
        .cd-arrow-double { stroke-width: 2.5px; }
        .cd-arrow-label { font-size: 11px; fill: #d2a8ff; text-anchor: middle; }
        .region-circle { fill-opacity: 0.15; stroke-width: 2px; }
        .region-label { font-size: 13px; fill: var(--text-primary); text-anchor: middle; dominant-baseline: middle; font-weight: 600; }
        .region-annotation { font-size: 11px; fill: var(--text-secondary); text-anchor: middle; dominant-baseline: middle; }
        .viz-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .viz-table th { background: var(--code-bg); padding: 8px 12px; border: 1px solid var(--border); font-weight: 600; text-align: center; }
        .viz-table td { padding: 8px 12px; border: 1px solid var(--border); text-align: center; }
        .viz-table tr:hover td { background: var(--code-bg); }
        .viz-table caption { caption-side: bottom; padding: 8px; font-size: 11px; color: var(--text-secondary); font-style: italic; }
        .katex { font-size: 0.95em; }
        .viz-text-block { line-height: 1.7; font-size: 15px; max-width: 720px; margin: 0 auto; padding: 24px; }
        .viz-text-block p { margin-bottom: 1em; }
        .article-section { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
        .article-section:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <p><a href="/expositions.html">&larr; Back to Expositions</a></p>
        <div id="msg" class="msg" style="display:none"></div>
        <div id="content"></div>
    </div>
    <script src="/shared.js"></script>
    <script src="/viz-renderer.js"></script>
    <script>
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) {
                showMsg('msg', 'No exposition ID specified.', true);
                return;
            }
            try {
                const e = await api('GET', '/expositions/' + encodeURIComponent(id));
                document.title = (e.title || e.exposition_id) + ' — Proof@Home';

                const vizData = typeof e.exposition_text === 'string' ? (function() { try { return JSON.parse(e.exposition_text); } catch { return {}; } })() : (e.exposition_text || {});
                const vizs = vizData.visualizations || vizData.panels || [];

                let metaHtml = `<dl class="viz-meta">
                    <dt>Author:</dt><dd>${escapeHtml(e.author_username || '')}</dd>
                    ${e.conjecture_id ? `<dt>Conjecture:</dt><dd><a href="/conjecture.html?id=${encodeURIComponent(e.conjecture_id)}">${escapeHtml(e.conjecture_id)}</a></dd>` : ''}
                    ${e.contribution_id ? `<dt>Contribution:</dt><dd>${escapeHtml(e.contribution_id)}</dd>` : ''}
                    ${e.domain ? `<dt>Domain:</dt><dd>${escapeHtml(e.domain)}</dd>` : ''}
                    <dt>Cost:</dt><dd>$${(e.cost_usd || 0).toFixed(4)}</dd>
                    <dt>Strategy:</dt><dd>${escapeHtml(e.strategy_used || '')}</dd>
                </dl>`;

                let summaryHtml = (e.summary || vizData.summary) ? `<p class="viz-summary">${escapeHtml(e.summary || vizData.summary)}</p>` : '';

                const useArticleLayout = vizs.some(v => v.type === 'text');
                let tabsHtml = '';
                let panelsHtml = '';

                if (vizs.length > 0) {
                    if (useArticleLayout) {
                        vizs.forEach((viz, i) => {
                            if (viz.type === 'text') {
                                panelsHtml += `<div class="article-section" id="viz-${i}"></div>`;
                            } else {
                                panelsHtml += `<div class="article-section">
                                    <div class="panel-title">${escapeHtml(viz.title || '')}</div>
                                    <div class="panel-desc">${escapeHtml(viz.description || '')}</div>
                                    <div class="viz-container" id="viz-${i}"></div>
                                </div>`;
                            }
                        });
                    } else {
                        tabsHtml = '<div class="tabs" id="viz-tabs">';
                        vizs.forEach((viz, i) => {
                            tabsHtml += `<button class="tab${i === 0 ? ' active' : ''}" onclick="switchVizTab(${i})">${escapeHtml(viz.title || 'Panel ' + (i + 1))}</button>`;
                            panelsHtml += `<div class="panel${i === 0 ? ' active' : ''}" id="panel-${i}">
                                <div class="panel-title">${escapeHtml(viz.title || '')}</div>
                                <div class="panel-desc">${escapeHtml(viz.description || '')}</div>
                                <div class="viz-container" id="viz-${i}"></div>
                            </div>`;
                        });
                        tabsHtml += '</div>';
                    }
                }

                // Fallback for plain text exposition (no visualizations array)
                let bodyHtml = '';
                if (vizs.length > 0) {
                    bodyHtml = tabsHtml + panelsHtml;
                } else if (e.exposition_text) {
                    bodyHtml = `<div class="viz-text-block"><pre style="white-space:pre-wrap;font-family:inherit">${escapeHtml(e.exposition_text)}</pre></div>`;
                } else {
                    bodyHtml = '<p class="text-secondary">No exposition content available.</p>';
                }

                document.getElementById('content').innerHTML = `
                    <h1>${escapeHtml(e.title || e.exposition_id)}</h1>
                    ${metaHtml}
                    ${summaryHtml}
                    ${bodyHtml}
                `;

                // Render each visualization
                vizs.forEach((viz, i) => {
                    const container = document.getElementById(`viz-${i}`);
                    if (!container) return;
                    try {
                        const vizPayload = viz.data || viz;
                        switch (viz.type) {
                            case 'text': renderText(container, vizPayload); break;
                            case 'generic_graph': renderGraph(container, vizPayload, i); break;
                            case 'commutative_diagram': renderCD(container, vizPayload, i); break;
                            case 'region_diagram':
                            case 'region_containment': renderRegion(container, vizPayload, i); break;
                            case 'table': renderTable(container, vizPayload); break;
                            default: container.innerHTML = `<p style="padding:24px;color:var(--text-secondary)">Unknown type: ${escapeHtml(viz.type)}</p>`;
                        }
                    } catch (err) {
                        container.innerHTML = `<p style="padding:24px;color:var(--danger)">Error rendering: ${escapeHtml(err.message)}</p>`;
                    }
                });
            } catch (err) {
                showMsg('msg', 'Failed to load exposition: ' + (err.error || err.message || 'not found'), true);
            }
        }

        function switchVizTab(idx) {
            document.querySelectorAll('#viz-tabs .tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
</html>
