<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson — Proof@Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/coq.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/lean.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
    <style>
        pre code.hljs { background: var(--code-bg); padding: 0; }
        .series-nav {
            background: var(--accent-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .series-nav-title {
            font-weight: 600;
            color: var(--accent);
        }
        .series-nav-pos {
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }
        .series-nav-links {
            display: flex;
            justify-content: space-between;
            margin-top: 0.35rem;
        }
        .series-nav-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .series-nav-links a:hover { text-decoration: underline; }
        .lesson-meta {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .lesson-meta dt { color: var(--text-secondary); font-weight: 600; display: inline; }
        .lesson-meta dd { display: inline; margin: 0 1.5rem 0 0.25rem; }
        .lesson-body { line-height: 1.7; }
        .lesson-body h1 { font-size: 1.5rem; margin: 2rem 0 0.75rem; }
        .lesson-body h2 { font-size: 1.2rem; margin: 1.75rem 0 0.625rem; }
        .lesson-body h3 { font-size: 1rem; margin: 1.5rem 0 0.5rem; }
        .lesson-body p { margin: 0 0 1rem; }
        .lesson-body ul, .lesson-body ol { margin: 0 0 1rem; padding-left: 1.5rem; }
        .lesson-body li { margin-bottom: 0.25rem; }
        .lesson-body blockquote {
            border-left: 3px solid var(--accent);
            margin: 0 0 1rem;
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            background: var(--accent-subtle);
            border-radius: 0 var(--radius) var(--radius) 0;
        }
        .lesson-body table {
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .conj-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: 1rem 0 1.5rem;
        }
        .conj-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: inherit;
            transition: all var(--transition);
            font-size: 0.85rem;
        }
        .conj-item:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
        }
        .conj-item-num {
            flex-shrink: 0;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 6px;
            background: var(--accent-subtle);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
        }
        .conj-item-info { flex: 1; }
        .conj-item-title { font-weight: 600; }
        .conj-item-id { color: var(--text-muted); font-size: 0.75rem; }

        /* ── AI Sparkle button ──────────────────────────── */
        .ai-sparkle {
            display: inline-flex;
            align-items: center;
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            opacity: 0.45;
            padding: 0 0.25rem;
            font-size: 0.9em;
            vertical-align: middle;
            transition: opacity var(--transition), color var(--transition);
        }
        .ai-sparkle:hover {
            opacity: 1;
            box-shadow: none;
            transform: none;
        }

        /* ── Floating Ask AI button ────────────────────── */
        #ai-ask-float {
            position: fixed;
            z-index: 45;
            display: none;
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--nav-bg);
            color: #e2e8f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transition: opacity 0.15s ease;
            white-space: nowrap;
        }
        #ai-ask-float.visible {
            display: block;
            opacity: 1;
        }
        #ai-ask-float:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: var(--shadow-lg);
            transform: none;
        }

        /* ── AI Sidebar ─────────────────────────────────── */
        .ai-sidebar {
            position: fixed;
            top: 3.25rem;
            right: -400px;
            width: 380px;
            height: calc(100vh - 3.25rem);
            background: var(--surface);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            z-index: 40;
            transition: right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ai-sidebar.open { right: 0; }
        body.sidebar-open .container {
            margin-right: 380px;
            transition: margin-right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.625rem 0.875rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        .ai-sidebar-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 0.25rem;
            line-height: 1;
        }
        .ai-sidebar-close:hover {
            color: var(--text);
            box-shadow: none;
            transform: none;
        }

        /* ── Settings bar ──────────────────────────────── */
        .ai-settings-bar {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.875rem;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            background: var(--bg);
        }
        .ai-settings-bar select {
            flex: 1;
            min-width: 0;
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color var(--transition);
            cursor: pointer;
        }
        .ai-settings-bar select:focus {
            border-color: var(--accent);
        }
        .ai-settings-bar select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .ai-add-key-btn {
            flex-shrink: 0;
            width: 1.5rem;
            height: 1.5rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition);
            line-height: 1;
        }
        .ai-add-key-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: none;
            transform: none;
        }

        /* ── Inline key form ───────────────────────────── */
        .ai-key-form {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.75rem 0.875rem;
            border-bottom: 1px solid var(--border-light);
            background: var(--code-bg);
            flex-shrink: 0;
            animation: slideDown 0.15s ease-out;
        }
        .ai-key-form.open { display: flex; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ai-key-form .kf-row {
            display: flex;
            gap: 0.375rem;
        }
        .ai-key-form input,
        .ai-key-form select {
            flex: 1;
            min-width: 0;
            padding: 0.35rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color var(--transition);
        }
        .ai-key-form input:focus,
        .ai-key-form select:focus {
            border-color: var(--accent);
        }
        .ai-key-form input:disabled {
            opacity: 0.5;
        }
        .ai-key-form .kf-consent {
            display: flex;
            align-items: flex-start;
            gap: 0.375rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .ai-key-form .kf-consent input[type="checkbox"] {
            flex: 0 0 auto;
            width: 0.85rem;
            height: 0.85rem;
            margin-top: 0.1rem;
        }
        .ai-key-form .kf-actions {
            display: flex;
            gap: 0.375rem;
        }
        .ai-key-form .kf-actions button {
            padding: 0.3rem 0.625rem;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .ai-key-form .kf-save-btn {
            background: var(--accent);
            color: #fff;
            border: none;
        }
        .ai-key-form .kf-save-btn:hover { background: var(--accent-hover); transform: none; }
        .ai-key-form .kf-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ai-key-form .kf-cancel-btn {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .ai-key-form .kf-cancel-btn:hover { border-color: var(--text-muted); transform: none; box-shadow: none; }
        .ai-key-form .kf-remove-btn {
            background: none;
            color: var(--red);
            border: 1px solid transparent;
            margin-left: auto;
        }
        .ai-key-form .kf-remove-btn:hover { background: var(--red-subtle); transform: none; box-shadow: none; }

        /* ── Trust banner (compact) ────────────────────── */
        .ai-trust-compact {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.4;
            padding: 0.25rem 0;
        }
        .ai-trust-compact a { font-weight: 500; }

        /* ── Key error banner ─────────────────────────── */
        .ai-key-error-banner {
            background: var(--red-subtle);
            border-bottom: 1px solid #fecaca;
            padding: 0.5rem 0.875rem;
            font-size: 0.75rem;
            color: #991b1b;
            flex-shrink: 0;
        }
        .ai-key-error-banner a {
            color: #991b1b;
            font-weight: 600;
            text-decoration: underline;
        }

        /* ── WebLLM progress bar ──────────────────────── */
        .ai-webllm-progress {
            display: none;
            padding: 0.5rem 0.875rem;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .ai-webllm-progress.active { display: block; }
        .ai-webllm-progress-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        .ai-webllm-progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .ai-webllm-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ── Zone / selection context ─────────────────── */
        #ai-sidebar-zone {
            padding: 0.625rem 0.875rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            line-height: 1.5;
            max-height: 5rem;
            overflow-y: auto;
        }
        #ai-sidebar-zone:empty { display: none; }
        .zone-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        /* ── No-key message ────────────────────────────── */
        .ai-no-key-msg {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.825rem;
            line-height: 1.6;
        }

        /* ── Messages area ─────────────────────────────── */
        .ai-sidebar-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 0.875rem;
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
        }
        .ai-sidebar-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            padding: 0.4rem 0.875rem;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .ai-sidebar-suggestions:empty { display: none; }
        .ai-suggestion-pill {
            background: var(--accent-subtle);
            color: var(--accent);
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 0.2rem 0.625rem;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
        }
        .ai-suggestion-pill:hover {
            border-color: var(--accent);
            box-shadow: none;
            transform: none;
        }

        .ai-msg {
            font-size: 0.825rem;
            line-height: 1.6;
            border-radius: var(--radius);
            padding: 0.5rem 0.625rem;
            max-width: 100%;
            overflow-wrap: break-word;
        }
        .ai-msg p { margin: 0 0 0.4rem; }
        .ai-msg p:last-child { margin-bottom: 0; }
        .ai-msg pre { font-size: 0.75rem; margin: 0.4rem 0; }
        .ai-msg.user {
            background: var(--accent-subtle);
            align-self: flex-end;
        }
        .ai-msg.assistant {
            border-left: 3px solid var(--accent);
            background: var(--code-bg);
        }
        .ai-msg.error {
            background: var(--red-subtle);
            color: #991b1b;
            font-size: 0.78rem;
        }

        /* ── Input area ────────────────────────────────── */
        .ai-sidebar-input {
            display: flex;
            gap: 0.375rem;
            padding: 0.625rem 0.875rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ai-sidebar-input textarea {
            flex: 1;
            padding: 0.4rem 0.625rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-family: inherit;
            resize: none;
            outline: none;
            background: var(--surface);
            color: var(--text);
            transition: border-color var(--transition);
        }
        .ai-sidebar-input textarea:focus { border-color: var(--accent); }
        .ai-sidebar-input textarea:disabled { opacity: 0.5; cursor: not-allowed; }
        .ai-sidebar-input button {
            flex-shrink: 0;
            align-self: flex-end;
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
        }
        .ai-sidebar-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .ai-sidebar { width: 100%; right: -100%; }
            .ai-sidebar.open { right: 0; }
            body.sidebar-open .container { margin-right: 0; }
        }
    </style>
</head>
<body>
    <nav id="navbar"></nav>
    <div class="container">
        <p id="back-link"><a href="/lessons.html">&larr; Back to Lessons</a></p>
        <div id="series-nav-top"></div>
        <div id="msg" class="msg" style="display:none"></div>
        <div id="content"></div>
        <div id="series-nav-bottom"></div>
    </div>

    <button id="ai-ask-float">Ask AI</button>

    <div id="ai-sidebar" class="ai-sidebar">
        <div class="ai-sidebar-header">
            <span>AI Tutor</span>
            <button class="ai-sidebar-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="ai-settings-bar">
            <select id="ai-key-select" onchange="onKeyChange()"></select>
            <select id="ai-model-select" onchange="onModelChange()"></select>
            <button class="ai-add-key-btn" id="ai-add-key-btn" onclick="toggleKeyForm()" title="Manage keys">+</button>
        </div>
        <div id="ai-key-form" class="ai-key-form"></div>
        <div id="ai-key-error" class="ai-key-error-banner" style="display:none;"></div>
        <div id="ai-webllm-progress" class="ai-webllm-progress">
            <div class="ai-webllm-progress-label" id="ai-webllm-label">Loading model...</div>
            <div class="ai-webllm-progress-bar"><div class="ai-webllm-progress-fill" id="ai-webllm-fill"></div></div>
        </div>
        <div id="ai-sidebar-zone"></div>
        <div id="ai-suggestions" class="ai-sidebar-suggestions"></div>
        <div id="ai-no-key" class="ai-no-key-msg" style="display:none;">Add an API key to start chatting.</div>
        <div id="ai-messages" class="ai-sidebar-messages"></div>
        <div class="ai-sidebar-input">
            <textarea id="ai-input" placeholder="Ask a question..." rows="2"></textarea>
            <button id="ai-send" onclick="sendCurrentMessage()">Send</button>
        </div>
    </div>

    <script src="/shared.js"></script>
    <script>
        // ── State ──
        let currentContext = null;   // { text, zone, suggestions, source, zoneKey }
        let currentAnnotationMap = null;
        let chatHistory = [];
        let lessonTitle = '';
        let sending = false;
        let keyErrorState = false;
        let selectedText = '';
        let webllmEngine = null;
        let webllmLoading = false;

        // ── localStorage helpers (multi-key) ──
        const BROWSER_DEMO_KEY = { id: 'browser-demo', label: 'Browser (Free)', provider: 'browser', key: '' };
        const BROWSER_MODELS = ['SmolLM2-360M-Instruct-q4f16_1-MLC', 'Phi-3.5-mini-instruct-q4f16_1-MLC'];

        function getKeys() {
            try { return JSON.parse(localStorage.getItem('pah_ai_keys')) || []; }
            catch { return []; }
        }
        function setKeys(keys) { localStorage.setItem('pah_ai_keys', JSON.stringify(keys)); }

        function getActiveKeyId() { return localStorage.getItem('pah_ai_active_key_id') || ''; }
        function setActiveKeyId(id) { localStorage.setItem('pah_ai_active_key_id', id); }

        function getActiveKey() {
            const keys = getKeys();
            const id = getActiveKeyId();
            return keys.find(k => k.id === id) || keys[0] || null;
        }

        function addKey(entry) {
            const keys = getKeys();
            keys.push(entry);
            setKeys(keys);
        }

        function removeKey(id) {
            let keys = getKeys();
            keys = keys.filter(k => k.id !== id);
            setKeys(keys);
            if (getActiveKeyId() === id) {
                setActiveKeyId(keys[0]?.id || '');
            }
        }

        function getActiveModel() { return localStorage.getItem('pah_ai_active_model') || ''; }
        function setActiveModel(m) { localStorage.setItem('pah_ai_active_model', m); }

        function getAIConsent() { return localStorage.getItem('pah_ai_consent_ts') || ''; }
        function setAIConsent() { localStorage.setItem('pah_ai_consent_ts', new Date().toISOString()); }

        function getModelsCache() {
            try { return JSON.parse(localStorage.getItem('pah_ai_models_cache')) || {}; }
            catch { return {}; }
        }
        function setModelsCache(c) { localStorage.setItem('pah_ai_models_cache', JSON.stringify(c)); }

        function maskKey(key) {
            if (!key) return '';
            const last4 = key.slice(-4);
            return key.startsWith('sk-') ? 'sk-...' + last4 : '...' + last4;
        }

        // ── Migration from old schema ──
        function migrateOldSchema() {
            const oldKey = localStorage.getItem('pah_ai_api_key');
            const oldProvider = localStorage.getItem('pah_ai_provider');
            if (oldKey) {
                const entry = {
                    id: crypto.randomUUID(),
                    label: (oldProvider === 'openai' ? 'OpenAI' : 'Anthropic') + ' Key',
                    provider: oldProvider || 'anthropic',
                    key: oldKey
                };
                const keys = getKeys();
                keys.push(entry);
                setKeys(keys);
                setActiveKeyId(entry.id);
                localStorage.removeItem('pah_ai_api_key');
                localStorage.removeItem('pah_ai_provider');
            }

            // Ensure browser demo key exists
            const keys = getKeys();
            if (!keys.find(k => k.id === 'browser-demo')) {
                keys.unshift(BROWSER_DEMO_KEY);
                setKeys(keys);
            }
            if (!getActiveKeyId() && keys.length > 0) {
                setActiveKeyId(keys[0].id);
            }
        }

        // ── Settings bar rendering ──
        function renderKeySelect() {
            const sel = document.getElementById('ai-key-select');
            const keys = getKeys();
            const activeId = getActiveKeyId();
            sel.innerHTML = keys.map(k => {
                const suffix = k.provider === 'browser' ? '' : ` (${maskKey(k.key)})`;
                return `<option value="${escapeAttr(k.id)}" ${k.id === activeId ? 'selected' : ''}>${escapeHtml(k.label)}${escapeHtml(suffix)}</option>`;
            }).join('');
            if (keys.length === 0) {
                sel.innerHTML = '<option value="">No keys</option>';
                sel.disabled = true;
            } else {
                sel.disabled = false;
            }
        }

        async function renderModelSelect() {
            const sel = document.getElementById('ai-model-select');
            const key = getActiveKey();
            if (!key) {
                sel.innerHTML = '<option value="">—</option>';
                sel.disabled = true;
                return;
            }

            if (key.provider === 'browser') {
                const active = getActiveModel();
                sel.innerHTML = BROWSER_MODELS.map(m =>
                    `<option value="${escapeAttr(m)}" ${m === active ? 'selected' : ''}>${escapeHtml(m)}</option>`
                ).join('');
                sel.disabled = false;
                if (!active || !BROWSER_MODELS.includes(active)) {
                    setActiveModel(BROWSER_MODELS[0]);
                }
                return;
            }

            // Check cache
            const cache = getModelsCache();
            const cached = cache[key.id];
            if (cached && (Date.now() - cached.ts) < 300000) {
                populateModelSelect(sel, cached.models);
                return;
            }

            sel.innerHTML = '<option value="">Loading...</option>';
            sel.disabled = true;

            try {
                const resp = await api('POST', '/ai/models', {
                    provider: key.provider,
                    api_key: key.key
                });
                const models = resp.models || [];
                cache[key.id] = { models, ts: Date.now() };
                setModelsCache(cache);
                populateModelSelect(sel, models);
            } catch (e) {
                const errMsg = e.error || e.message || 'Failed to load models';
                sel.innerHTML = `<option value="">Error</option>`;
                sel.disabled = false;
                if (errMsg.includes('rejected') || errMsg.includes('API key')) {
                    showKeyErrorBanner('API key rejected. Check your key.');
                }
            }
        }

        function populateModelSelect(sel, models) {
            const active = getActiveModel();
            const defaultModel = getActiveKey()?.provider === 'openai' ? 'gpt-4o' : 'claude-sonnet-4-20250514';
            sel.innerHTML = models.map(m =>
                `<option value="${escapeAttr(m)}" ${m === active ? 'selected' : ''}>${escapeHtml(m)}</option>`
            ).join('');
            sel.disabled = false;
            // Pre-select: active model, or default, or first
            if (active && models.includes(active)) {
                sel.value = active;
            } else if (models.includes(defaultModel)) {
                sel.value = defaultModel;
                setActiveModel(defaultModel);
            } else if (models.length > 0) {
                sel.value = models[0];
                setActiveModel(models[0]);
            }
        }

        // ── Floating button ──
        function initFloatingButton() {
            const floatBtn = document.getElementById('ai-ask-float');
            const lessonBody = document.querySelector('.lesson-body');
            console.log('[AskAI] initFloatingButton', { lessonBody: !!lessonBody });
            if (!lessonBody) return;

            let selDebounce = null;

            // selectionchange fires on every caret/selection change — debounce it
            document.addEventListener('selectionchange', () => {
                clearTimeout(selDebounce);
                selDebounce = setTimeout(() => {
                    const sel = window.getSelection();
                    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) {
                        console.log('[AskAI] skip: no selection or collapsed', {
                            sel: !!sel,
                            rangeCount: sel?.rangeCount,
                            isCollapsed: sel?.isCollapsed
                        });
                        floatBtn.classList.remove('visible');
                        return;
                    }
                    const text = sel.toString().trim();
                    if (!text) {
                        console.log('[AskAI] skip: empty text');
                        floatBtn.classList.remove('visible');
                        return;
                    }

                    // Check if either endpoint is inside .lesson-body
                    const anchorEl = sel.anchorNode?.nodeType === Node.TEXT_NODE ? sel.anchorNode.parentElement : sel.anchorNode;
                    const focusEl = sel.focusNode?.nodeType === Node.TEXT_NODE ? sel.focusNode.parentElement : sel.focusNode;
                    const anchorIn = anchorEl?.closest('.lesson-body');
                    const focusIn = focusEl?.closest('.lesson-body');
                    if (!anchorIn && !focusIn) {
                        console.log('[AskAI] skip: not in .lesson-body', {
                            anchorTag: anchorEl?.tagName,
                            anchorClass: anchorEl?.className,
                            anchorClosest: anchorEl?.closest('[class]')?.className,
                            focusTag: focusEl?.tagName,
                            focusClass: focusEl?.className,
                            focusClosest: focusEl?.closest('[class]')?.className,
                            text: text.slice(0, 60)
                        });
                        floatBtn.classList.remove('visible');
                        return;
                    }

                    selectedText = text;
                    const range = sel.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    if (!rect.width && !rect.height) {
                        console.log('[AskAI] skip: zero-size rect', { rect });
                        floatBtn.classList.remove('visible');
                        return;
                    }

                    // Position above-right of selection, clamped to viewport
                    // Button is position:fixed so use viewport-relative coords (no scroll offset)
                    let top = rect.top - 32;
                    if (top < 4) top = rect.bottom + 4;
                    let left = rect.right + 8;
                    const btnWidth = 70;
                    if (left + btnWidth > window.innerWidth) {
                        left = rect.left - btnWidth - 8;
                    }
                    if (left < 4) left = 4;
                    console.log('[AskAI] SHOW button', {
                        text: text.slice(0, 60),
                        rect: { top: rect.top, left: rect.left, w: rect.width, h: rect.height },
                        btnPos: { top, left },
                        viewport: { w: window.innerWidth, h: window.innerHeight }
                    });
                    floatBtn.style.top = top + 'px';
                    floatBtn.style.left = left + 'px';
                    floatBtn.classList.add('visible');
                }, 80);
            });

            // Hide on pointerdown anywhere except the float button itself
            document.addEventListener('pointerdown', (e) => {
                if (e.target === floatBtn || floatBtn.contains(e.target)) return;
                floatBtn.classList.remove('visible');
            });

            floatBtn.addEventListener('click', () => {
                floatBtn.classList.remove('visible');
                if (!selectedText) return;

                // Check if selection is within an annotated zone
                const context = resolveSelectionContext(selectedText);
                openSidebar(context);
            });
        }

        function resolveSelectionContext(text) {
            if (!currentAnnotationMap) {
                return { text, zone: null, suggestions: [], source: 'selection', zoneKey: null };
            }

            // Walk up from selection to find nearest heading
            const sel = window.getSelection();
            if (!sel || !sel.anchorNode) {
                return { text, zone: null, suggestions: [], source: 'selection', zoneKey: null };
            }

            let node = sel.anchorNode;
            if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;

            // Walk backwards through siblings and up the DOM to find nearest heading
            while (node && node.closest('.lesson-body')) {
                if (/^H[123]$/.test(node.tagName)) {
                    const zoneKey = headingToZoneKey(node);
                    if (currentAnnotationMap[zoneKey]) {
                        const ann = currentAnnotationMap[zoneKey];
                        return { text: '', zone: ann.context, suggestions: ann.suggestions || [], source: 'annotation', zoneKey };
                    }
                }
                // Check previous siblings
                let prev = node.previousElementSibling;
                while (prev) {
                    if (/^H[123]$/.test(prev.tagName)) {
                        const zoneKey = headingToZoneKey(prev);
                        if (currentAnnotationMap[zoneKey]) {
                            const ann = currentAnnotationMap[zoneKey];
                            return { text, zone: ann.context, suggestions: ann.suggestions || [], source: 'selection', zoneKey };
                        }
                    }
                    prev = prev.previousElementSibling;
                }
                node = node.parentElement;
            }

            return { text, zone: null, suggestions: [], source: 'selection', zoneKey: null };
        }

        function headingToZoneKey(heading) {
            const text = heading.textContent.trim();
            const level = heading.tagName.toLowerCase();
            const prefix = level === 'h1' ? '# ' : level === 'h2' ? '## ' : '### ';
            return prefix + text;
        }

        // ── Message rendering ──
        function escapeAttr(s) {
            return s.replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function appendMessage(role, html) {
            const messagesEl = document.getElementById('ai-messages');
            const div = document.createElement('div');
            div.className = 'ai-msg ' + role;
            div.innerHTML = html;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function renderAIContent(text) {
            let html = marked.parse(text);
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html;
            wrapper.querySelectorAll('pre code').forEach(el => {
                if (typeof hljs !== 'undefined') hljs.highlightElement(el);
            });
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(wrapper, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            }
            return wrapper.innerHTML;
        }

        function showKeyErrorBanner(msg) {
            keyErrorState = true;
            const banner = document.getElementById('ai-key-error');
            banner.innerHTML = escapeHtml(msg);
            banner.style.display = 'block';
        }

        // ── WebLLM ──
        async function getWebLLMEngine() {
            if (webllmEngine) return webllmEngine;
            if (webllmLoading) return null;

            // Check WebGPU support
            if (!navigator.gpu) {
                throw new Error("Your browser doesn't support WebGPU. Use Chrome 113+ or Edge 113+.");
            }

            webllmLoading = true;
            const progressEl = document.getElementById('ai-webllm-progress');
            const labelEl = document.getElementById('ai-webllm-label');
            const fillEl = document.getElementById('ai-webllm-fill');
            progressEl.classList.add('active');

            try {
                const webllm = await import('https://esm.run/@mlc-ai/web-llm');
                const model = getActiveModel() || BROWSER_MODELS[0];

                const engine = await webllm.CreateMLCEngine(model, {
                    initProgressCallback: (report) => {
                        labelEl.textContent = report.text || 'Loading model...';
                        if (report.progress !== undefined) {
                            fillEl.style.width = (report.progress * 100) + '%';
                        }
                    }
                });

                webllmEngine = engine;
                progressEl.classList.remove('active');
                webllmLoading = false;
                return engine;
            } catch (err) {
                progressEl.classList.remove('active');
                webllmLoading = false;
                throw err;
            }
        }

        async function chatWithWebLLM(systemPrompt, messages) {
            const engine = await getWebLLMEngine();
            if (!engine) throw new Error('Model is still loading. Please wait.');

            const allMessages = [
                { role: 'system', content: systemPrompt },
                ...messages
            ];

            const reply = await engine.chat.completions.create({
                messages: allMessages,
                max_tokens: 1024
            });

            return reply.choices[0]?.message?.content || '';
        }

        // ── Send message ──
        async function sendMessage(text) {
            if (!text || !text.trim() || sending) return;
            const key = getActiveKey();
            if (!key) return;
            if (key.provider !== 'browser' && !key.key) return;

            sending = true;
            document.getElementById('ai-send').disabled = true;

            appendMessage('user', escapeHtml(text));
            chatHistory.push({ role: 'user', content: text });

            const loadingEl = appendMessage('assistant', '<em>Thinking...</em>');

            // Build context
            const zoneContext = currentContext?.zone || currentContext?.text || '';
            const contextType = currentContext?.source === 'annotation' ? 'annotation' : 'selection';
            const model = getActiveModel();

            try {
                let content;

                if (key.provider === 'browser') {
                    // Use WebLLM
                    let systemPrompt;
                    if (contextType === 'selection' && zoneContext) {
                        systemPrompt = `You are a math tutor helping a student with the lesson '${lessonTitle}'. The student selected the following text and has a question about it:\n\n${zoneContext}\n\nUse $...$ for inline and $$...$$ for display math. Be concise.`;
                    } else if (zoneContext) {
                        systemPrompt = `You are a math tutor helping a student with ${zoneContext} in '${lessonTitle}'. Use $...$ for inline and $$...$$ for display math. Be concise.`;
                    } else {
                        systemPrompt = `You are a math tutor helping a student with the lesson '${lessonTitle}'. Use $...$ for inline and $$...$$ for display math. Be concise.`;
                    }
                    content = await chatWithWebLLM(systemPrompt, chatHistory);
                } else {
                    // Use backend
                    const resp = await api('POST', '/ai/chat', {
                        messages: chatHistory,
                        zone_context: zoneContext,
                        lesson_title: lessonTitle,
                        api_key: key.key,
                        provider: key.provider,
                        model: model,
                        context_type: contextType
                    });
                    content = resp.content;
                }

                chatHistory.push({ role: 'assistant', content });
                loadingEl.innerHTML = renderAIContent(content);

                if (keyErrorState) {
                    keyErrorState = false;
                    document.getElementById('ai-key-error').style.display = 'none';
                }
            } catch (e) {
                loadingEl.className = 'ai-msg error';
                const errMsg = e.error || e.message || 'Failed to get response';

                if (errMsg.includes('rejected') || errMsg.includes('API key')) {
                    loadingEl.textContent = 'Your API key was rejected.';
                    showKeyErrorBanner('API key rejected by the provider.');
                } else if (errMsg.includes('Rate limited')) {
                    loadingEl.textContent = 'Rate limited. Please wait a moment.';
                } else if (errMsg.includes('credits') || errMsg.includes('billing')) {
                    loadingEl.textContent = 'Insufficient credits. Check your provider billing.';
                } else if (errMsg.includes('WebGPU')) {
                    loadingEl.textContent = errMsg;
                } else {
                    loadingEl.textContent = 'AI error. Try again later.';
                }
                chatHistory.pop();
            } finally {
                sending = false;
                document.getElementById('ai-send').disabled = false;
            }
        }

        function sendCurrentMessage() {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if (text) {
                input.value = '';
                sendMessage(text);
            }
        }

        function buildSeriesNav(series, lessonIds, currentId) {
            const idx = lessonIds.indexOf(currentId);
            if (idx === -1) return '';
            const pos = `Lesson ${idx + 1} of ${lessonIds.length}`;
            const sid = encodeURIComponent(series.series_id);
            const prevLink = idx > 0
                ? `<a href="/series/${sid}/lessons/${encodeURIComponent(lessonIds[idx - 1])}">&larr; Previous</a>`
                : '<span></span>';
            const nextLink = idx < lessonIds.length - 1
                ? `<a href="/series/${sid}/lessons/${encodeURIComponent(lessonIds[idx + 1])}">Next &rarr;</a>`
                : '<span></span>';
            return `<div class="series-nav">
                <span class="series-nav-title">${escapeHtml(series.title)}</span>
                <span class="series-nav-pos">&middot; ${pos}</span>
                <div class="series-nav-links">${prevLink}${nextLink}</div>
            </div>`;
        }

        // ── Lesson loading ──
        async function load() {
            let id, seriesId;
            const pathMatch = window.location.pathname.match(/^\/series\/([^/]+)\/lessons\/([^/]+)$/);
            if (pathMatch) {
                seriesId = decodeURIComponent(pathMatch[1]);
                id = decodeURIComponent(pathMatch[2]);
            } else {
                id = new URLSearchParams(window.location.search).get('id');
            }
            if (!id) {
                showMsg('msg', 'No lesson ID specified.', true);
                return;
            }

            migrateOldSchema();

            try {
                const lesson = await api('GET', '/lessons/' + encodeURIComponent(id));

                // Series navigation
                if (seriesId) {
                    try {
                        const series = await api('GET', '/series/' + encodeURIComponent(seriesId));
                        const lessonIds = series.lesson_ids || [];
                        const navHtml = buildSeriesNav(series, lessonIds, id);
                        document.getElementById('series-nav-top').innerHTML = navHtml;
                        document.getElementById('series-nav-bottom').innerHTML = navHtml;
                        // Update back link to point to lessons with series context
                        document.getElementById('back-link').innerHTML =
                            `<a href="/lessons.html">&larr; Back to ${escapeHtml(series.title)}</a>`;
                    } catch (_) { /* series fetch failed, skip nav */ }
                }
                lessonTitle = lesson.title || lesson.lesson_id;
                document.title = lessonTitle + ' — Proof@Home';

                let metaHtml = `<dl class="lesson-meta">
                    ${lesson.author_username ? `<dt>Author:</dt><dd>${escapeHtml(lesson.author_username)}</dd>` : ''}
                    ${lesson.topic ? `<dt>Topic:</dt><dd>${escapeHtml(lesson.topic)}</dd>` : ''}
                    ${lesson.difficulty ? `<dt>Difficulty:</dt><dd>${difficultyBadge(lesson.difficulty)}</dd>` : ''}
                    ${lesson.prerequisites ? `<dt>Prerequisites:</dt><dd>${escapeHtml(lesson.prerequisites)}</dd>` : ''}
                    <dt>Conjectures:</dt><dd>${(lesson.conjecture_ids || []).length}</dd>
                </dl>`;

                let bodyHtml = '';
                if (lesson.content) {
                    bodyHtml = `<div class="lesson-body">${marked.parse(lesson.content)}</div>`;
                }

                const conjIds = lesson.conjecture_ids || [];
                let conjHtml = '';
                if (conjIds.length > 0) {
                    conjHtml = '<h2>Conjectures</h2><div class="conj-list" id="conj-list"></div>';
                }

                document.getElementById('content').innerHTML = `
                    <h1>${escapeHtml(lessonTitle)}</h1>
                    ${metaHtml}
                    ${bodyHtml}
                    ${conjHtml}
                `;

                // ── AI annotation sparkles ──
                const annotations = lesson.ai_annotations || [];
                if (annotations.length > 0) {
                    currentAnnotationMap = {};
                    annotations.forEach(a => { currentAnnotationMap[a.zone] = a; });

                    document.querySelectorAll('.lesson-body h1, .lesson-body h2, .lesson-body h3').forEach(heading => {
                        const zoneKey = headingToZoneKey(heading);

                        if (currentAnnotationMap[zoneKey]) {
                            const btn = document.createElement('button');
                            btn.className = 'ai-sparkle';
                            btn.innerHTML = '&#10024;';
                            btn.addEventListener('click', (e) => {
                                e.preventDefault();
                                const ann = currentAnnotationMap[zoneKey];
                                openSidebar({
                                    text: '',
                                    zone: ann.context,
                                    suggestions: ann.suggestions || [],
                                    source: 'annotation',
                                    zoneKey
                                });
                            });

                            heading.appendChild(document.createTextNode(' '));
                            heading.appendChild(btn);
                        }
                    });
                }

                // Init floating button
                initFloatingButton();

                // Fetch conjectures
                if (conjIds.length > 0) {
                    const conjList = document.getElementById('conj-list');
                    const results = await Promise.allSettled(
                        conjIds.map(cid => api('GET', '/conjectures/' + encodeURIComponent(cid)))
                    );
                    conjList.innerHTML = results.map((r, i) => {
                        const cid = conjIds[i];
                        if (r.status === 'fulfilled') {
                            const c = r.value;
                            return `<a class="conj-item" href="/conjecture.html?id=${encodeURIComponent(cid)}">
                                <div class="conj-item-num">${i + 1}</div>
                                <div class="conj-item-info">
                                    <div class="conj-item-title">${escapeHtml(c.title || cid)}</div>
                                    <div class="conj-item-id">${escapeHtml(cid)} &middot; ${escapeHtml(c.prover || '')} ${c.difficulty ? '&middot; ' + escapeHtml(c.difficulty) : ''}</div>
                                </div>
                                <div>${c.status ? statusDot(c.status) : ''}</div>
                            </a>`;
                        }
                        return `<a class="conj-item" href="/conjecture.html?id=${encodeURIComponent(cid)}">
                            <div class="conj-item-num">${i + 1}</div>
                            <div class="conj-item-info">
                                <div class="conj-item-title">${escapeHtml(cid)}</div>
                            </div>
                        </a>`;
                    }).join('');
                }

                // Syntax highlighting
                document.querySelectorAll('.lesson-body pre code').forEach(el => {
                    hljs.highlightElement(el);
                });

                // KaTeX
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(document.getElementById('content'), {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                }
            } catch (e) {
                showMsg('msg', 'Failed to load lesson: ' + (e.error || e.message || 'not found'), true);
            }
        }

        // Enter key submits
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('ai-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendCurrentMessage();
                }
            });
        });

        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
</html>
