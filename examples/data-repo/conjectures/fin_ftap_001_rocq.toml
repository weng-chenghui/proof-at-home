lemma_statement = "Lemma ftap_forward : forall u d r : R,\n  d < u -> d < 1 + r -> 1 + r < u ->\n  let q := (1 + r - d) / (u - d) in\n  0 < q /\\ q < 1 /\\\n  q * u + (1 - q) * d = 1 + r."
