lemma_statement = "Lemma binomial_risk_neutral : forall u d r : R,\n  d < u -> d < 1 + r -> 1 + r < u ->\n  let q := (1 + r - d) / (u - d) in\n  0 < q /\\ q < 1."
skeleton = "Lemma binomial_risk_neutral : forall u d r : R,\n  d < u -> d < 1 + r -> 1 + r < u ->\n  let q := (1 + r - d) / (u - d) in\n  0 < q /\\ q < 1.\nProof.\n  (* your proof here *)\nAdmitted."
