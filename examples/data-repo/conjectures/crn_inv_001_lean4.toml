id = "crn_inv_001_lean4"
title = "Concentration stays in stoichiometric compatibility class"
difficulty = "medium"
prover = "lean4"
status = "open"
preamble = "import Mathlib.Data.Matrix.Basic\nimport Mathlib.LinearAlgebra.AffineSpace.Basic\nimport Mathlib.Tactic"
lemma_statement = "theorem compatibility_class_invariant\n    {m r : ℕ} (S : Matrix (Fin m) (Fin r) ℝ) (c₀ c : Fin m → ℝ)\n    (w : Fin r → ℝ) (h : c = c₀ + S.mulVec w) :\n    c - c₀ ∈ Set.range S.mulVec := by"
skeleton = "theorem compatibility_class_invariant\n    {m r : ℕ} (S : Matrix (Fin m) (Fin r) ℝ) (c₀ c : Fin m → ℝ)\n    (w : Fin r → ℝ) (h : c = c₀ + S.mulVec w) :\n    c - c₀ ∈ Set.range S.mulVec := by\n  sorry"
hints = [
    "Rewrite h to get c - c₀ = S.mulVec w",
    "Use Set.mem_range to reduce to exhibiting the witness w",
    "exact ⟨w, by rw [h]; ring⟩ or similar should close the goal",
    "The key insight is that c - c₀ = S * w by hypothesis",
]

