lemma_statement = "Lemma o_atom_conservation :\n  let S : 'cV[int]_3 := \\col_i [:: -2; -1; 2]`_i in\n  let aO : 'rV[int]_3 := \\row_j [:: 0; 2; 1]`_j in\n  aO *m S = 0."
