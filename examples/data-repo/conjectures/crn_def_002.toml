preamble = "From mathcomp Require Import all_ssreflect all_algebra.\nOpen Scope ring_scope."
lemma_statement = "Lemma enzymatic_deficiency_zero :\n  let n : nat := 3 in\n  let l : nat := 1 in\n  let S : 'M[int]_(4, 3) :=\n    \\matrix_(i < 4, j < 3)\n      [:: [:: -1;  1;  1];\n          [:: -1;  1;  0];\n          [::  1; -1; -1];\n          [::  0;  0;  1]]`_i`_j in\n  let s : nat := 2 in\n  n - l - s = 0."
