id = "newman_003"
title = "Newman's Lemma: WCR + SN implies CR"
difficulty = "hard"
prover = "rocq"
status = "open"
preamble = "Require Import Coq.Relations.Relation_Definitions.\nRequire Import Coq.Relations.Relation_Operators.\nRequire Import Coq.Init.Wf.\n\nSection Newman.\n\nVariable A : Type.\nVariable R : relation A.\n\nDefinition WCR : Prop :=\n  forall a b c, R a b -> R a c ->\n  exists d, clos_refl_trans A R b d /\\ clos_refl_trans A R c d.\n\nDefinition CR : Prop :=\n  forall a b c, clos_refl_trans A R a b -> clos_refl_trans A R a c ->\n  exists d, clos_refl_trans A R b d /\\ clos_refl_trans A R c d."
lemma_statement = "Lemma newman : well_founded (transp A R) -> WCR -> CR."
hints = [
    "Use well-founded induction",
    "Key insight: use SN to do induction, then case-split on local confluence",
    "The transp flips R so that well_founded (transp R) means every reduction sequence terminates",
]
skeleton = "Lemma newman : well_founded (transp A R) -> WCR -> CR.\nProof.\n  (* your proof here *)\nAdmitted.\n\nEnd Newman."

