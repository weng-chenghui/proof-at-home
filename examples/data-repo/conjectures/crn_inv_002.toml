preamble = "From mathcomp Require Import all_ssreflect all_algebra.\nOpen Scope ring_scope."
lemma_statement = "Lemma carbon_invariant :\n  let S : 'cV[int]_4 := \\col_i [:: -1; -2; 1; 2]`_i in\n  let aC : 'rV[int]_4 := \\row_j [:: 1; 0; 1; 0]`_j in\n  aC *m S = 0."
skeleton = "Lemma carbon_invariant :\n  let S : 'cV[int]_4 := \\col_i [:: -1; -2; 1; 2]`_i in\n  let aC : 'rV[int]_4 := \\row_j [:: 1; 0; 1; 0]`_j in\n  aC *m S = 0.\nProof.\n  (* your proof here *)\nAdmitted."
